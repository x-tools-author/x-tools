name: build-ubuntu
on:
  schedule:
    - cron: "0 5 * * 6"
  workflow_dispatch: # Enables manually
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
  # push:
  #   branches:
  #     - master

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            arch: gcc_64
            version: 6.2.4
          - os: ubuntu-22.04
            arch: gcc_64
            version: 6.5.3
          - os: ubuntu-22.04
            arch: linux_gcc_64
            version: 6.8.3
          - os: ubuntu-22.04
            arch: linux_gcc_64
            version: 6.9.3
          - os: ubuntu-22.04
            arch: linux_gcc_64
            version: 6.10.3
          - os: ubuntu-22.04
            arch: linux_gcc_64
            version: 6.11.0

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: "==3.1.*"
          version: ${{ matrix.version }}
          target: "desktop"
          arch: ${{ matrix.arch }}
          dir: ${{ github.workspace }}
          modules: "qtcharts qtserialbus qtserialport qtwebsockets"
      - name: install-dependencies
        shell: bash
        run: |
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor-dev libudev-dev libusb-dev libusb-1.0-0-dev ninja-build
      - name: build for linux
        shell: bash
        run: |
          git fetch --tags
          cmake --version
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH='${{ github.workspace }}/Qt/${{ matrix.version }}/${{ matrix.arch }}' -DCMAKE_BUILD_TYPE=Release -G "Ninja" ../
          cmake --build . --target xTools
          cmake --build . --target xTools_linux
